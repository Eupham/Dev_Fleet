name: Deploy & Test on Modal

on:
  push:
    branches: [main]
    paths:
      - "inference/**"
      - "orchestrator/**"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Which service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - inference
          - orchestrator

# Use the GitHub environment that holds the Modal secrets
env:
  MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
  MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}

jobs:
  validate:
    name: Validate Modal configs
    runs-on: ubuntu-latest
    environment: modal secrets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install modal networkx pydantic httpx

      - name: Validate inference/server.py syntax & Modal API
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('s', 'inference/server.py'); m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m); print('✓ inference/server.py')"

      - name: Validate orchestrator/core_app.py syntax & Modal API
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('s', 'orchestrator/core_app.py'); m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m); print('✓ orchestrator/core_app.py')"

  deploy-inference:
    name: Deploy Inference Engine to Modal
    needs: validate
    runs-on: ubuntu-latest
    environment: modal secrets
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'inference'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Modal
        run: pip install modal

      - name: Deploy inference service (detached)
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: modal deploy inference/server.py --detach

      - name: Fetch deployment logs
        if: always()
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: modal app logs devfleet-inference --timeout 30 || true

  deploy-orchestrator:
    name: Deploy Orchestrator to Modal
    needs: validate
    runs-on: ubuntu-latest
    environment: modal secrets
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'orchestrator'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Modal + deps
        run: pip install modal networkx pydantic httpx

      - name: Deploy orchestrator service (detached)
        env:
          MODAL_TOKEN_ID: ${{ secrets.AG_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.AG_MODAL_TOKEN_SECRET }}
        run: modal deploy orchestrator/core_app.py --detach

      - name: Fetch deployment logs
        if: always()
        env:
          MODAL_TOKEN_ID: ${{ secrets.AG_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.AG_MODAL_TOKEN_SECRET }}
        run: modal app logs devfleet-orchestrator --timeout 30 || true

  smoke-test:
    name: Smoke test on Modal
    needs: [deploy-inference, deploy-orchestrator]
    runs-on: ubuntu-latest
    environment: modal secrets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install modal networkx pydantic httpx

      - name: Run orchestrator smoke test on Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.AG_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.AG_MODAL_TOKEN_SECRET }}
        run: |
          modal run orchestrator/core_app.py --prompt "Write a hello world function in Python"
