name: Deploy & Test on Modal

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "inference/**"
      - "orchestrator/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Modal configs
    runs-on: ubuntu-latest
    environment: modal secrets
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install modal networkx pydantic

      - name: Validate app.py syntax & Modal API
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('app', 'app.py'); m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m); print('✓ app.py')"

  deploy:
    name: Deploy Dev Fleet to Modal
    needs: validate
    runs-on: ubuntu-latest
    environment: modal secrets
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Modal
        run: pip install modal

      - name: Deploy unified app
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: modal deploy app.py

      - name: Fetch deployment logs
        if: always()
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: timeout 30 modal app logs devfleet || true

  smoke-test:
    name: Smoke test on Modal
    needs: deploy
    runs-on: ubuntu-latest
    environment: modal secrets
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install modal networkx pydantic

      - name: Run orchestrator smoke test on Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: |
          modal run app.py --prompt "Write a hello world function in Python"

      - name: Run Modal-native unit tests
        env:
          MODAL_TOKEN_ID: ${{ secrets.DF_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DF_MODAL_TOKEN_SECRET }}
        run: |
          modal run tests/modal_test_runner.py
